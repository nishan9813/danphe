services:

  postgres:
    image: postgres:16-alpine
    container_name: personal-db
    environment:
      POSTGRES_DB: personal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: nishan@90
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: personal-redis
    ports:
      - "6379:6379"

  app:
    build:
      context: .
      dockerfile: Dockerfile.system
    container_name: personal-app
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./config.docker.properties:/opt/personal/apps/config.properties
    environment:
      spring.datasource.url: jdbc:postgresql://postgres:5432/personal?stringtype=unspecified
      spring.datasource.username: postgres
      spring.datasource.password: nishan@90
      spring.datasource.driver-class-name: org.postgresql.Driver
      spring.data.redis.host: redis
      spring.data.redis.port: 6379
      spring.mail.username: your@email.com
      spring.mail.password: your_password
      jwt.secret: 12345678901234567890123456789012

volumes:
  postgres-data:
